<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .info {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .join-form,
      .form {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }

      input,
      button {
        font: inherit;
        padding: 8px 10px;
      }

      input[type="text"] {
        flex: 1;
      }

      .messages {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid #ccc;
        min-height: 320px;
      }

      .messages li {
        padding: 6px 8px;
        border-bottom: 1px solid #eee;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Chat</h1>
      <p class="info">謗･邯壻ｺｺ謨ｰ: <span class="count">0</span></p>

      <div class="join-form">
        <input class="name" type="text" maxlength="20" placeholder="蜷榊燕" value="Guest" />
        <input class="color" type="color" value="#2563eb" aria-label="濶ｲ" />
        <button class="join" type="button">蜈･螳､</button>
      </div>

      <ul class="messages"></ul>

      <form class="form">
        <input class="message-input" type="text" autocomplete="off" placeholder="繝｡繝・そ繝ｼ繧ｸ" disabled />
        <button class="send" disabled>騾∽ｿ｡</button>
      </form>
    </div>

    <script>
      const host = location.origin.replace(/^http/, 'ws')
      const ws = new WebSocket(`${host}/ws`)

      const form = document.querySelector('.form')
      const input = document.querySelector('.message-input')
      const messages = document.querySelector('.messages')
      const joinButton = document.querySelector('.join')
      const nameInput = document.querySelector('.name')
      const colorInput = document.querySelector('.color')
      const count = document.querySelector('.count')
      const sendButton = document.querySelector('.send')

      function addSystemMessage(text) {
        const li = document.createElement('li')
        li.textContent = text
        messages.appendChild(li)
      }

      function addChatMessage(data) {
        const li = document.createElement('li')
        li.textContent = `${data.name}: ${data.text}`
        messages.appendChild(li)
        messages.scrollTop = messages.scrollHeight
      }

      function send(data) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(data))
        }
      }

      joinButton.addEventListener('click', () => {
        const name = nameInput.value.trim() || 'Guest'
        send({
          type: 'join',
          name,
          color: colorInput.value,
        })
        nameInput.disabled = true
        colorInput.disabled = true
        joinButton.disabled = true
        input.disabled = false
        sendButton.disabled = false
        input.focus()
      })

      form.addEventListener('submit', (event) => {
        event.preventDefault()
        const text = input.value.trim()
        if (text === '') return

        send({
          type: 'chat',
          text,
        })
        input.value = ''
        input.focus()
      })

      ws.addEventListener('open', () => {
        addSystemMessage('謗･邯壹＠縺ｾ縺励◆')
      })

      ws.addEventListener('message', (event) => {
        const data = JSON.parse(event.data)

        if (data.type === 'count') {
          count.textContent = data.count
          return
        }

        if (data.type === 'system') {
          addSystemMessage(data.text)
          return
        }

        if (data.type === 'chat') {
          addChatMessage(data)
        }
      })

      ws.addEventListener('close', () => {
        input.disabled = true
        sendButton.disabled = true
        addSystemMessage('蛻・妙縺輔ｌ縺ｾ縺励◆')
      })

      ws.addEventListener('error', () => {
        addSystemMessage('繧ｨ繝ｩ繝ｼ')
      })
    </script>
  </body>
</html>
